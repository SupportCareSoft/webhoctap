.opt-zone button,.arrange-pool button,.row-options button,.arrange-answer button{
    padding:8px 14px;border-radius:12px;border:2px solid #eee;background:white;cursor:pointer;font-weight:bold

.match-icon{font-size:40px;text-align:center;background:#fff8e1;border-radius:14px;padding:10px;border:2px solid #ffe082}
.row-options{display:flex;gap:8px;flex-wrap:wrap}

er", "vi": "giáo viên", "sentence": "The teacher is nice."}, {"emoji": "👮", "en": "policeman", "vi": "chú công an", "sentence": "The policeman helps people."}, {"emoji": "🧑‍⚕️", "en": "doctor", "vi": "bác sĩ", "sentence": "The doctor works at a hospital."}, {"emoji": "👶", "en": "baby", "vi": "em bé", "sentence": "The baby is sleeping."}, {"emoji": "👀", "en": "eyes", "vi": "đôi mắt", "sentence": "I have two eyes."}, {"emoji": "👂", "en": "ears", "vi": "đôi tai", "sentence": "I have two ears."}, {"emoji": "👃", "en": "nose", "vi": "cái mũi", "sentence": "This is my nose."}, {"emoji": "👄", "en": "mouth", "vi": "cái miệng", "sentence": "Open your mouth."}, {"emoji": "🖐️", "en": "hand", "vi": "bàn tay", "sentence": "Raise your hand."}, {"emoji": "🦶", "en": "foot", "vi": "bàn chân", "sentence": "My foot is small."}, {"emoji": "💇", "en": "hair", "vi": "tóc", "sentence": "Her hair is long."}, {"emoji": "🦵", "en": "leg", "vi": "chân", "sentence": "The boy has strong legs."}, {"emoji": "💪", "en": "arm", "vi": "cánh tay", "sentence": "My arm is strong."}, {"emoji": "🦷", "en": "teeth", "vi": "răng", "sentence": "Brush your teeth every day."}], "passages": [{"text": "My mother cooks dinner and my father sets the table.", "question": "Who cooks dinner?", "answer": "my mother", "options": ["my mother", "my father", "my grandmother"]}, {"text": "The teacher reads a story in class.", "question": "Who reads a story?", "answer": "the teacher", "options": ["the doctor", "the teacher", "the policeman"]}, {"text": "The doctor helps sick people. She works in a hospital.", "question": "Where does the doctor work?", "answer": "in a hospital", "options": ["in a school", "in a hospital", "in a park"]}, {"text": "My grandfather tells funny stories.", "question": "Who tells funny stories?", "answer": "my grandfather", "options": ["my mother", "my grandfather", "my sister"]}, {"text": "The boy plays with the baby. The girl laughs.", "question": "Who laughs?", "answer": "the girl", "options": ["the boy", "the girl", "the baby"]}]}};
let currentTopic = 'WEATHER';
let currentSet = 1;
let currentQuestions = [];
let answers = {};

function speak(text){
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US';
    window.speechSynthesis.speak(u);
}
function shuffle(arr){
    const a = [...arr];
    for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
}
function progressKey(topic){ return 'english_v3_progress_' + topic; }
function getTopicProgress(topic){ return JSON.parse(localStorage.getItem(progressKey(topic)) || '{"doneSets":[]}'); }
function markDone(topic,setNo){
    const p = getTopicProgress(topic);
    if(!p.doneSets.includes(setNo)) p.doneSets.push(setNo);
    localStorage.setItem(progressKey(topic), JSON.stringify(p));
}
function buildChoice(word, idx){
    const pool = topics[currentTopic].words.filter(w=>w.en!==word.en).map(w=>w.en);
    return {id:'q'+idx,type:'choice',tag:'Chọn đáp án',image:word.emoji,speak:word.en,prompt:'Chọn từ đúng với hình minh họa',answer:word.en,options:shuffle([word.en,...shuffle(pool).slice(0,2)])};
}
function buildListening(word, idx){
    const pool = topics[currentTopic].words.filter(w=>w.en!==word.en).map(w=>w.en);
    return {id:'q'+idx,type:'listening',tag:'Nghe và chọn',speak:word.en,prompt:'Bấm loa rồi chọn từ bé nghe được',answer:word.en,options:shuffle([word.en,...shuffle(pool).slice(0,2)])};
}
function buildFill(word, idx){
    const pool = topics[currentTopic].words.filter(w=>w.en!==word.en).map(w=>w.en);
    return {id:'q'+idx,type:'fill',tag:'Điền từ còn thiếu',image:word.emoji,speak:word.en,prompt:word.sentence.replace(word.en,'_____'),answer:word.en,options:shuffle([word.en,...shuffle(pool).slice(0,2)])};
}
function buildPassage(passage, idx){
    return {id:'q'+idx,type:'passage',tag:'Đọc hiểu',passage:passage.text,prompt:passage.question,answer:passage.answer,options:passage.options};
}
function buildArrange(word, idx){
    const sentence = word.sentence.replace('.','');
    return {id:'q'+idx,type:'arrange',tag:'Sắp xếp câu',prompt:'Bấm các từ theo đúng thứ tự để tạo thành câu hoàn chỉnh.',answer:sentence,pieces:shuffle(sentence.split(' '))};
}
function buildMatchRows(words, idx){
    return {
        id:'q'+idx,type:'match_rows',tag:'Nối hình với từ',
        rows: words.map(w=>{
            const others = words.filter(x=>x.en!==w.en).map(x=>x.en);
            return {emoji:w.emoji, answer:w.en, options:shuffle([w.en,...shuffle(others).slice(0,2)])};
        })
    };
}
function buildSet(topicKey, setNo){
    const t = topics[topicKey];
    const s = (setNo-1)*2;
    const w0=t.words[(s)%10], w1=t.words[(s+1)%10], w2=t.words[(s+2)%10], w3=t.words[(s+3)%10], w4=t.words[(s+4)%10], w5=t.words[(s+5)%10], w6=t.words[(s+6)%10], w7=t.words[(s+7)%10];
    return [
        buildChoice(w0,1),
        buildChoice(w1,2),
        buildListening(w2,3),
        buildFill(w3,4),
        buildPassage(t.passages[(setNo-1)%t.passages.length],5),
        buildPassage(t.passages[(setNo)%t.passages.length],6),
        buildArrange(w4,7),
        buildListening(w5,8),
        buildMatchRows([w0,w1,w6],9),
        buildFill(w7,10)
    ];
}
function renderTopicTabs(){
    document.getElementById('topicTabs').innerHTML = Object.keys(topics).map(key=>{
        const t = topics[key];
        return '<button class="menu-btn ' + (key===currentTopic?'active':'') + '" onclick="changeTopic(\'' + key + '\')">' + t.icon + ' ' + t.label + '</button>';
    }).join('');
}
function renderSetTabs(){
    const p = getTopicProgress(currentTopic);
    document.getElementById('setTabs').innerHTML = Array.from({length:5},(_,i)=>i+1).map(no=>{
        let cls = 'set-btn';
        if(no===currentSet) cls += ' active';
        if(p.doneSets.includes(no)) cls += ' done';
        return '<button class="' + cls + '" onclick="changeSet(' + no + ')">Đề ' + no + '</button>';
    }).join('');
}
function renderStatus(){
    const t = topics[currentTopic];
    document.getElementById('topicTitle').innerText = t.icon + ' ' + t.label + ' - ' + t.vn;
    document.getElementById('statusTopic').innerText = t.label;
    document.getElementById('statusSet').innerText = currentSet;
    document.getElementById('statusDone').innerText = getTopicProgress(currentTopic).doneSets.length;
}
function chooseImmediate(qid, value){
    const q = currentQuestions.find(x=>x.id===qid);
    if(!q) return;
    answers[qid] = value;

    q.options.forEach(opt=>{
        const btn = document.getElementById(qid + '_' + encodeURIComponent(opt));
        if(btn) btn.classList.remove('selected', 'correct', 'wrong', 'locked');
    });

    const chosenBtn = document.getElementById(qid + '_' + encodeURIComponent(value));
    const card = document.getElementById('card_' + qid);
    if(card) card.classList.remove('done');

    if(value === q.answer){
        if(chosenBtn) chosenBtn.classList.add('correct');
        if(card) card.classList.add('done');
    } else {
        if(chosenBtn) chosenBtn.classList.add('wrong');
    }
}
function addArrangeWord(qid, word){
    const q = currentQuestions.find(x=>x.id===qid);
    answers[qid] = answers[qid] || [];
    if((answers[qid] || []).length >= q.answer.split(' ').length) return;
    answers[qid].push(word);
    renderArrange(qid);
}
function removeLastArrange(qid){
    if(!answers[qid] || !answers[qid].length) return;
    answers[qid].pop();
    renderArrange(qid);
}
function renderArrange(qid){
    const q = currentQuestions.find(x=>x.id===qid);
    const ans = answers[qid] || [];
    const answerBox = document.getElementById(qid + '_answer');
    if(answerBox){
        answerBox.innerHTML = ans.map((w,i)=>'<button type="button">' + w + '</button>').join('');
    }
    const pool = document.getElementById(qid + '_pool');
    if(pool){
        const remaining = [...q.pieces];
        ans.forEach(w=>{
            const idx = remaining.indexOf(w);
            if(idx > -1) remaining.splice(idx,1);
        });
        pool.innerHTML = remaining.map(w=>'<button onclick="addArrangeWord(\'' + qid + '\', \''
            + String(w).replace(/'/g,"\\'") + '\')">' + w + '</button>').join('');
    }
}
function checkArrangeNow(qid){
    const q = currentQuestions.find(x=>x.id===qid);
    const ans = (answers[qid] || []).join(' ');
    const answerWords = q.answer.split(' ').length;
    if((answers[qid] || []).length < answerWords){
        alert('Bé hãy xếp đủ các từ trước nhé!');
        return;
    }
    const box = document.getElementById(qid + '_answerWrap');
    const card = document.getElementById('card_' + qid);
    if(box){
        box.classList.remove('correct', 'wrong');
        const oldMsg = box.querySelector('.row-result');
        if(oldMsg) oldMsg.remove();
    }
    if(card) card.classList.remove('done');

    if(ans === q.answer){
        if(box) box.classList.add('correct');
        if(card) card.classList.add('done');
    } else {
        if(box){
            box.classList.add('wrong');
            box.innerHTML += '<div class="row-result bad">Sai rồi. Bé sắp xếp lại nhé!</div>';
        }
    }
    renderArrange(qid);
}
function chooseMatchRow(qid, rowIndex, value){
    const q = currentQuestions.find(x=>x.id===qid);
    answers[qid] = answers[qid] || {};
    answers[qid][rowIndex] = value;

    const row = q.rows[rowIndex];
    row.options.forEach(opt=>{
        const btn = document.getElementById(qid + '_r' + rowIndex + '_' + encodeURIComponent(opt));
        if(btn) btn.classList.remove('selected', 'correct', 'wrong', 'locked');
    });

    const chosenBtn = document.getElementById(qid + '_r' + rowIndex + '_' + encodeURIComponent(value));
    const result = document.getElementById(qid + '_result_' + rowIndex);

    if(value === row.answer){
        if(chosenBtn) chosenBtn.classList.add('correct');
        if(result){ result.className = 'row-result ok'; result.innerText = 'Đúng rồi!'; }
    } else {
        if(chosenBtn) chosenBtn.classList.add('wrong');
        if(result){ result.className = 'row-result bad'; result.innerText = 'Sai rồi. Bé chọn lại nhé!'; }
    }

    const allCorrect = q.rows.every((r,i)=>answers[qid] && answers[qid][i] === r.answer);
    const card = document.getElementById('card_' + qid);
    if(card){
        card.classList.toggle('done', allCorrect);
    }
}
function renderQuestions(){
    currentQuestions = buildSet(currentTopic, currentSet);
    answers = {};
    document.getElementById('quiz-container').innerHTML = currentQuestions.map((q, i)=>{
        let body = '';
        if(q.type === 'arrange'){
            body = '<div class="arrange-help">Bé bấm các từ theo đúng thứ tự để tạo thành câu.</div>'
                + '<div class="question-text">' + q.prompt + '</div>'
                + '<div id="' + q.id + '_answerWrap"><div class="arrange-answer" id="' + q.id + '_answer"></div></div>'
                + '<div class="arrange-pool" id="' + q.id + '_pool"></div>'
                + '<div class="arrange-note">Xếp xong thì bấm kiểm tra.</div>'
                + '<button class="small-btn" onclick="removeLastArrange(\'' + q.id + '\')">Xoá từ cuối</button> '
                + '<button class="small-btn" onclick="checkArrangeNow(\'' + q.id + '\')">Kiểm tra</button>';
        } else if(q.type === 'match_rows'){
            body = '<div class="match-help">Mỗi hàng là một câu nhỏ riêng. Bé nhìn hình rồi chọn đúng một từ. Sai sẽ đỏ ngay, đúng sẽ xanh ngay.</div>'
                + '<div class="match-table">'
                + q.rows.map((row, idx)=>'<div class="match-line"><div class="match-icon">' + row.emoji + '</div><div><div class="row-options">'
                    + row.options.map(opt=>'<button id="' + q.id + '_r' + idx + '_' + encodeURIComponent(opt) + '" onclick="chooseMatchRow(\'' + q.id + '\',' + idx + ',\'' + String(opt).replace(/'/g,"\\'") + '\')">' + opt + '</button>').join('')
                    + '</div><div class="row-result" id="' + q.id + '_result_' + idx + '"></div></div></div>').join('')
                + '</div>';
        } else {
            const speakBtn = q.speak ? '<button class="speak-btn" onclick="speak(\'' + q.speak + '\')">🔊</button>' : '';
            const imageBox = q.image ? '<div class="image-box">' + q.image + '</div>' : '';
            const passage = q.passage ? '<div class="passage">' + q.passage + '</div>' : '';
            const note = q.type === 'listening' ? '<div class="note-box">Bé bấm loa rồi chọn từ bé nghe được.</div>' : '';
            body = speakBtn + imageBox + passage + note
                + '<div class="question-text">' + q.prompt + '</div>'
                + '<div class="opt-zone">'
                + q.options.map(opt=>'<button id="' + q.id + '_' + encodeURIComponent(opt) + '" onclick="chooseImmediate(\'' + q.id + '\',\'' + String(opt).replace(/'/g,"\\'") + '\')">' + opt + '</button>').join('')
                + '</div>';
        }
        return '<div class="card" id="card_' + q.id + '"><div class="type-tag">' + q.tag + '</div><h4>Câu ' + (i+1) + '</h4>' + body + '</div>';
    }).join('');
    currentQuestions.filter(q=>q.type==='arrange').forEach(q=>renderArrange(q.id));
}
function isQuestionCorrect(q){
    if(q.type === 'match_rows'){
        return q.rows.every((row, idx)=>answers[q.id] && answers[q.id][idx] === row.answer);
    }
    if(q.type === 'arrange'){
        return (answers[q.id] || []).join(' ') === q.answer;
    }
    return answers[q.id] === q.answer;
}
async function submitSet(){
    const unanswered = currentQuestions.filter(q=>{
        if(q.type === 'match_rows'){
            return !answers[q.id] || Object.keys(answers[q.id]).length < q.rows.length;
        }
        if(q.type === 'arrange'){
            return !(answers[q.id] || []).length;
        }
        return !answers[q.id];
    });
    if(unanswered.length){
        alert('Bé hãy làm hết tất cả 10 câu trước nhé!');
        return;
    }
    const score = currentQuestions.filter(isQuestionCorrect).length;
    if(score === currentQuestions.length){
        markDone(currentTopic, currentSet);
        try{
            await db.ref('english_history').push({
                studentName: kidName || 'Bé',
                topic: currentTopic,
                setNo: currentSet,
                version: 'v3',
                result: score + '/' + currentQuestions.length,
                date: new Date().toLocaleString('vi-VN'),
                timestamp: Date.now()
            });
        }catch(e){
            console.log('Lưu điểm lỗi:', e.message);
        }
        renderSetTabs();
        renderStatus();
        if(currentSet < 5){
            alert('Xuất sắc! Bé đúng hết 10/10. Hệ thống sẽ chuyển sang đề tiếp theo.');
            currentSet += 1;
            renderSetTabs();
            renderStatus();
            renderQuestions();
        } else {
            alert('Tuyệt vời! Bé đã hoàn thành đủ 5 đề của chủ đề này.');
        }
    } else {
        alert('Bé được ' + score + '/10. Bé làm lại đề này nhé! Phải đúng hết mới được đổi đề.');
        renderQuestions();
    }
}
function changeTopic(topicKey){
    currentTopic = topicKey;
    currentSet = 1;
    renderTopicTabs();
    renderSetTabs();
    renderStatus();
    renderQuestions();
}
function changeSet(setNo){
    currentSet = setNo;
    renderSetTabs();
    renderStatus();
    renderQuestions();
}
window.onload = () => {
    if(!kidName){
        alert('Bé hãy quay lại Trang Chủ để đăng nhập nhé!');
        window.location.href = 'index.html';
        return;
    }
    document.getElementById('display-name').innerText = kidName;
    renderTopicTabs();
    renderSetTabs();
    renderStatus();
    renderQuestions();
};
</script>
